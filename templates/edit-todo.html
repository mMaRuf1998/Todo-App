{% include 'layout.html' %}
<div class="container">
  <div class="card">
    <div class="card-header">
      Let's edit your todo!
    </div>
    <div class="card-body">
      <form action="" id="editTodoForm">
        <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" class="form-control" value="{{todos.title}}">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" name="description" rows="3" required>{{todos.description}}</textarea>
        </div>

         <div class="form-group">
          <label>Priority</label>
           <select name="priority" class="form-control">
             <option {% if todos.priority == 1 %} selected="selected" {% endif %}>1</option>
             <option {% if todos.priority == 2 %} selected="selected" {% endif %}>2</option>
             <option {% if todos.priority == 3 %} selected="selected" {% endif %}>3</option>
             <option {% if todos.priority == 4 %} selected="selected" {% endif %}>4</option>
             <option {% if todos.priority == 5 %} selected="selected" {% endif %}>5</option>
           </select>

           <div class="form-group form-check">
             <input type="checkbox" class="form-check-input" name="complete" {% if todos.complete %} checked {% endif%}>
             <label class="form-check-label">Complete</label>
           </div>
           <button type="submit" class="btn btn-primary">Edit your todo</button>
           <a href="/todos/todo-page" class="btn btn-danger" id="deleteButton">Delete</a>
           <a href="/todos/todo-page" class="btn btn-success">Back</a>

         </div>
      </form>
    </div>
  </div>
</div>
